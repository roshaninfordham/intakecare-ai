<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cara is calling — CareLine</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: radial-gradient(120% 100% at 50% 0%, #12203A 0%, #0B1120 60%);
    color: #E8EEF7; font-family: 'Space Grotesk', system-ui, sans-serif;
    min-height: 100vh; min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center; justify-content: space-between;
    padding: 12vh 24px 8vh; text-align: center;
  }
  .caller { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .avatar-wrap { position: relative; width: 140px; height: 140px; }
  .avatar {
    width: 140px; height: 140px; border-radius: 50%;
    background: linear-gradient(135deg, #2DD4BF 0%, #0E7490 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 56px; font-weight: 700; color: #06251F;
    position: relative; z-index: 2;
  }
  .ring { position: absolute; inset: 0; border-radius: 50%; border: 2px solid rgba(45,212,191,0.5); animation: ripple 2s ease-out infinite; }
  .ring:nth-child(2) { animation-delay: 0.66s; }
  .ring:nth-child(3) { animation-delay: 1.33s; }
  @keyframes ripple { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.9); opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .ring { animation: none; } }
  body.connected .ring { animation: none; opacity: 0; }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .sub { color: #8194AD; font-size: 15px; }
  .status { font-family: 'IBM Plex Mono', monospace; font-size: 14px; color: #2DD4BF; min-height: 20px; letter-spacing: 0.06em; }
  .actions { display: flex; gap: 28px; align-items: center; }
  button {
    border: none; border-radius: 50%; width: 84px; height: 84px; font-size: 34px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s ease, filter 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { transform: scale(0.92); }
  #answer { background: #22C55E; color: white; box-shadow: 0 8px 40px rgba(34,197,94,0.45); animation: bounce 1.4s ease-in-out infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-7px);} }
  @media (prefers-reduced-motion: reduce) { #answer { animation: none; } }
  #hangup { background: #EF4444; color: white; display: none; box-shadow: 0 8px 40px rgba(239,68,68,0.4); }
  body.connected #answer { display: none; }
  body.connected #hangup { display: flex; }
  .label { font-size: 12px; color: #8194AD; margin-top: 10px; font-family: 'IBM Plex Mono', monospace; }
  .foot { font-size: 11px; color: #5B6B84; font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>
  <div class="caller">
    <div class="avatar-wrap">
      <div class="ring"></div><div class="ring"></div><div class="ring"></div>
      <div class="avatar">C</div>
    </div>
    <h1>Cara</h1>
    <div class="sub">CareLine Home Health — intake coordinator</div>
    <div class="status" id="status">incoming call…</div>
  </div>
  <div>
    <div class="actions">
      <div><button id="hangup" onclick="hangup()">✕</button></div>
      <div><button id="answer" onclick="answer()">📞</button><div class="label" id="answer-label">tap to answer</div></div>
    </div>
  </div>
  <div class="foot">synthetic demo · careline ai · secured voice over webrtc</div>

<script>
const params = new URLSearchParams(location.search);
const phone = params.get("me") || localStorage.getItem("careline_phone") || "";
let device = null, call = null, timerInt = null, t0 = 0;
const statusEl = document.getElementById("status");

async function answer() {
  const label = document.getElementById("answer-label");
  try {
    statusEl.textContent = "connecting…"; label.textContent = "";
    if (!window.Twilio) await new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = "https://cdn.jsdelivr.net/npm/@twilio/voice-sdk@2.12.1/dist/twilio.min.js";
      s.onload = res; s.onerror = rej; document.head.appendChild(s);
    });
    const { token } = await (await fetch("/api/voice-token")).json();
    device = new Twilio.Device(token, { logLevel: "error" });
    call = await device.connect({ params: { phone: phone || "+10000000000" } });
    call.on("accept", () => {
      document.body.classList.add("connected");
      t0 = Date.now();
      timerInt = setInterval(() => {
        const s = Math.floor((Date.now() - t0) / 1000);
        statusEl.textContent = String(Math.floor(s / 60)).padStart(2, "0") + ":" + String(s % 60).padStart(2, "0");
      }, 500);
    });
    const done = () => {
      clearInterval(timerInt);
      document.body.classList.remove("connected");
      statusEl.textContent = "call ended";
    };
    call.on("disconnect", done);
    call.on("cancel", done);
    call.on("error", (e) => { console.error(e); statusEl.textContent = "error: " + (e.message || e.code); });
  } catch (e) {
    console.error(e);
    statusEl.textContent = "couldn't connect — check mic permission";
    label.textContent = "tap to retry";
  }
}
function hangup() { if (call) call.disconnect(); }
</script>
</body>
</html>
